
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKC Training System</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#07122b;
color:white;
text-align:center;
margin:0;
padding:20px;
}

#logo{
width:180px;
margin-bottom:10px;
}

button{
width:260px;
padding:16px;
margin:10px;
border-radius:10px;
border:none;
font-size:18px;
cursor:pointer;
background:#0f2b6d;
color:white;
}

button:hover{background:#163b93}

.hidden{display:none}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #2b3c70;
padding:10px;
}

th{background:#0f2b6d}

iframe{
width:100%;
height:300px;
border:none;
margin-top:10px;
}

.back{background:#444}
</style>
</head>

<body>

<img id="logo" src="logo.png">

<h1>AKC TRAINING SYSTEM</h1>

<div id="home">
<button onclick="showSection('fuerza')">Fuerza</button><br>
<button onclick="showSection('preventivos')">Preventivos</button><br>
<button onclick="showSection('drills')">Drills Técnicos</button><br>
<button onclick="showSection('orientacion')">Orientación</button>
</div>

<div id="menu-fuerza" class="hidden">
<h2>Fuerza</h2>
<button onclick="loadDay('Lunes')">Lunes</button>
<button onclick="loadDay('Miercoles')">Miércoles</button>
<button onclick="loadDay('Viernes')">Viernes</button>
<button class="back" onclick="goHome()">Inicio</button>
</div>

<div id="menu-preventivos" class="hidden">
<h2>Preventivos</h2>
<button onclick="loadDay('Jueves')">Jueves</button>
<button class="back" onclick="goHome()">Inicio</button>
</div>

<div id="menu-drills" class="hidden">
<h2>Drills Técnicos</h2>
<div id="apparatusButtons"></div>
<button class="back" onclick="goHome()">Inicio</button>
</div>

<div id="menu-orientacion" class="hidden">
<h2>Orientación</h2>
<div id="orientacionList"></div>
<button class="back" onclick="goHome()">Inicio</button>
</div>

<div id="routine" class="hidden">
<h2 id="routineTitle"></h2>

<select id="weekSelector" onchange="renderRoutine()">
<option value="1">Semana 1</option>
<option value="2">Semana 2</option>
<option value="3">Semana 3</option>
<option value="4">Semana 4</option>
</select>

<div id="exerciseList"></div>

<button class="back" onclick="goHome()">Inicio</button>
</div>

<script src="app.js"></script>

</body>
</html>
